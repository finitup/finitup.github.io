<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finitup - AI 기반 자동 주식 리포트 & 실험적 예측 시스템</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00BCD4;
            --text-color: #333;
            --bg-color: #fff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .logo {
            margin-bottom: 2rem;
        }

        .logo img {
            max-width: 200px;
            height: auto;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.2rem;
            color: #666;
            max-width: 600px;
            margin: 0 auto 2rem;
        }

        .language-buttons {
            display: flex;
            gap: 1rem;
        }

        .language-button {
            display: inline-block;
            padding: 1rem 2rem;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .language-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 188, 212, 0.2);
        }

        footer {
            margin-top: 4rem;
            color: #666;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .language-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="logo">
        <img src="../logo/FinItUp_HighRes_logo.png" alt="Finitup 로고">
    </div>

    <h1>Finitup에 오신 것을 환영합니다</h1>
    <p>AI 기반 자동 주식 리포트 & 실험적 예측 시스템</p>

    <div class="language-buttons">
        <a href="../en/main.html" class="language-button">English Version</a>
        <a href="main.html" class="language-button">한국어 버전</a>
    </div>

    <footer>
        <p>© 2024 Finitup - 한국 등록 실험적 플랫폼</p>
    </footer>
</body>
</html>
